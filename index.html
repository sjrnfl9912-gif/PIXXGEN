<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes">
  <title>출하 관리 시스템</title>

  <!-- GitHub Pages 경로 설정 -->
  <base href="/PIXXGEN/">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/table.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/kpi.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">DB 동기화 중...</div>
  </div>

  <div class="top-fixed">
    <div class="topbar">
      <h1><span class="logo">📦</span><span class="logo-txt">통합 출하 관리 시스템</span></h1>
      <div class="sync"><div class="sync-dot"></div>동기화 중</div>
    </div>

    <div class="tabs">
      <div class="tab on" data-tab="ship">검사포장 출하이력<span class="cnt" id="cnt1">0</span></div>
      <div class="tab" data-tab="prod">생산관리대장<span class="cnt" id="cnt2">0</span></div>
      <div class="tab" data-tab="merge">통합취합본<span class="cnt" id="cnt3">0</span></div>
      <div class="tab" data-tab="kpi">📊 KPI 통계</div>
      <div class="tab-right">
        <span id="saveStatus" style="font-size:10px;color:var(--ok)">저장 완료</span>
        <button class="btn btn-pr" id="saveBtn" style="font-weight:600">💾 저장</button>
        <button class="btn btn-hide-m" id="backupBtn">📥 백업</button>
        <button class="btn btn-hide-m" id="restoreBtn">📤 복원</button>
        <input type="file" id="restoreFile" accept=".json" style="display:none">
        <button class="btn" id="reloadBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg><span class="btn-hide-m">새로고침</span></button>
        <button class="btn btn-pr btn-hide-m" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>엑셀 추출</button>
      </div>
    </div>
  </div>

  <!-- ══ TAB: 검사포장 ══ -->
  <div id="v-ship" class="tab-view active">
    <div class="toolbar">
      <div class="sbox" id="sb1"><input placeholder="검색..." id="q1" /><button class="s-clear">&times;</button></div>
      <button class="btn toolbar-toggle">필터 ▼</button>
      <span class="pill" id="p1">0건</span>
      <div class="toolbar-extras">
        <div class="chip on" data-filter="all" data-table="ship">전체</div>
        <div class="chip" data-filter="PIXX" data-table="ship">PIXX</div>
        <div class="chip" data-filter="PRUDENT" data-table="ship">PRUDENT</div>
        <div class="chip" data-filter="OPTIMUM" data-table="ship">OPTIMUM</div>
        <div class="chip dup" id="dupChip1">중복 S/N<span class="dup-badge" id="dupCnt1" style="display:none">0</span></div>
        <button class="btn" id="tftMatchBtn">🔗 TFT 매칭</button>
        <button class="btn" id="pasteShipBtn">📋 붙여넣기</button>
        <button class="btn" id="cleanShipBtn" title="빈 행 정리">🧹 빈행 삭제</button>
      </div>
    </div>
    <div class="tw"><table class="g" id="t1"><thead id="th1"></thead><tbody id="b1"></tbody></table></div>
    <div class="addrow" data-table="ship"><span>+ 새 행 추가</span><kbd>Ctrl+Enter</kbd></div>
  </div>

  <!-- ══ TAB: 생산관리대장 ══ -->
  <div id="v-prod" class="tab-view">
    <div class="toolbar">
      <div class="sbox" id="sb2"><input placeholder="검색..." id="q2" /><button class="s-clear">&times;</button></div>
      <button class="btn toolbar-toggle">필터 ▼</button>
      <span class="pill" id="p2">0건</span>
      <div class="toolbar-extras">
        <div class="chip on" data-filter="all" data-table="prod">전체</div>
        <div class="chip" data-filter="홍승범" data-table="prod">홍승범</div>
        <div class="chip" data-filter="김남식" data-table="prod">김남식</div>
        <div class="chip" data-filter="이다니엘" data-table="prod">이다니엘</div>
        <div class="chip" data-filter="방정완" data-table="prod">방정완</div>
        <div class="chip dup" id="dupChip2">중복 S/N<span class="dup-badge" id="dupCnt2" style="display:none">0</span></div>
        <button class="btn" id="pasteProdBtn">📋 붙여넣기</button>
        <button class="btn" id="cleanProdBtn" title="빈 행 정리">🧹 빈행 삭제</button>
      </div>
    </div>
    <div class="tw"><table class="g" id="t2"><thead id="th2"></thead><tbody id="b2"></tbody></table></div>
    <div class="addrow" data-table="prod"><span>+ 새 행 추가</span><kbd>Ctrl+Enter</kbd></div>
  </div>

  <!-- ══ TAB: 통합취합본 ══ -->
  <div id="v-merge" class="tab-view">
    <div class="toolbar">
      <div class="sbox" id="sb3"><input placeholder="검색..." id="q3" /><button class="s-clear">&times;</button></div>
      <button class="btn btn-pr" id="buildMergeBtn">🔄 출하+생산 취합</button>
      <span class="pill" id="p3">0건</span>
    </div>
    <div class="tw"><table class="g" id="t3"><thead id="th3"></thead><tbody id="b3"></tbody></table></div>
  </div>

  <!-- ══ TAB: KPI ══ -->
  <div id="v-kpi" class="tab-view">
    <div class="toolbar">
      <label style="font-size:11px;font-weight:500;color:var(--ts)">연도</label>
      <select class="kpi-ys" id="kpiYear"></select>
      <div class="chip on" id="kpiH0" data-period="0">전체</div>
      <div class="chip" id="kpiH1" data-period="1">상반기 (1~6월)</div>
      <div class="chip" id="kpiH2" data-period="2">하반기 (7~12월)</div>
      <span class="pill" id="kpiTotal">0건</span>
    </div>
    <div class="kpi-wrap" id="kpiWrap"></div>
  </div>

  <!-- Context Menu -->
  <div class="ctx" id="ctx">
    <div class="ctx-i" data-action="copy">📋 복사<kbd>Ctrl+C</kbd></div>
    <div class="ctx-i" data-action="cut">✂ 잘라내기<kbd>Ctrl+X</kbd></div>
    <div class="ctx-i" data-action="paste">📌 붙여넣기<kbd>Ctrl+V</kbd></div>
    <div class="ctx-s"></div>
    <div class="ctx-i" data-action="addrow">➕ 행 추가</div>
    <div class="ctx-i red" data-action="delrow">🗑 행 삭제<kbd>Ctrl+-</kbd></div>
  </div>

  <!-- Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-h"><h3 id="mTitle"></h3><p id="mDesc"></p></div>
      <div class="modal-b">
        <textarea id="mArea" spellcheck="false"></textarea>
        <div class="mprev" id="mPrev"></div>
      </div>
      <div class="modal-f">
        <span class="cnt" id="mCnt">0건</span>
        <button class="btn" id="modalCloseBtn">취소</button>
        <button class="btn btn-pr" id="modalConfirmBtn">적용</button>
      </div>
    </div>
  </div>

  <div class="toast-box" id="toasts"></div>

  <!-- Mobile proxy input -->
  <input id="mob-proxy" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

  <!-- Floating scroll-to-bottom button -->
  <button class="fab-bottom" id="fabBottom" title="맨 아래로">⬇</button>

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
